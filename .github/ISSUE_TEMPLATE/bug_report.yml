name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run the "Apply Overcoat Overlays" task
        3. ...
    validations:
      required: true
  - type: input
    id: jellyfin-version
    attributes:
      label: Jellyfin version
      placeholder: "10.11.x"
    validations:
      required: true
  - type: input
    id: overcoat-version
    attributes:
      label: Overcoat version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Jellyfin log lines mentioning "Overcoat" (redact anything sensitive).
      render: shell
