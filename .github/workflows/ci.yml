name: CI

# Runs on every push to main/dev and on every PR. There is no unit-test suite (see CONTRIBUTING),
# so this is deliberately about the two things that have actually broken in practice: the plugin
# failing to compile, and the hand-edited settings page shipping with a syntax error or a dangling
# element id. Both are cheap to check and neither is visible without checking.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Read-only by default; the release workflow asks for write separately.
permissions:
  contents: read

jobs:
  abi-floor:
    # The manifest's targetAbi decides which servers are offered the plugin, so it has to match the
    # oldest Jellyfin the code actually compiles against. A matrix build is the only thing that keeps
    # the two honest: it caught targetAbi claiming 10.11.0 while the code needed 10.11.9 APIs, which
    # would have handed 10.11.0–10.11.8 users a DLL that cannot load.
    name: ABI floor (${{ matrix.jellyfin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - jellyfin: '10.11.9'   # declared floor — MUST build
            expect: pass
          - jellyfin: '10.11.11'  # current — MUST build
            expect: pass
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'
      - name: Build against Jellyfin.Controller ${{ matrix.jellyfin }}
        run: |
          set -euo pipefail
          sed -i 's|<PackageReference Include="Jellyfin.Controller" Version="[^"]*">|<PackageReference Include="Jellyfin.Controller" Version="${{ matrix.jellyfin }}">|' \
            Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj
          dotnet build Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj -c Release
      - name: Confirm the declared targetAbi matches the floor
        if: matrix.jellyfin == '10.11.9'
        run: |
          set -euo pipefail
          grep -q 'TARGET_ABI = "10.11.9.0"' scripts/package_release.py \
            || { echo "::error::scripts/package_release.py TARGET_ABI no longer matches the tested floor"; exit 1; }


  build:
    name: Build + settings page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj

      # -warnaserror: the project builds clean today and should stay that way. A warning here is
      # nearly always a real mistake (an unused variable has already flagged a dead code path once).
      - name: Build
        run: dotnet build Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.Overcoat.Tests/Jellyfin.Plugin.Overcoat.Tests.csproj -c Release

      - name: Check the settings page
        run: node scripts/check_config_page.js

      # Proves the release packaging still works before a tag depends on it — the version and
      # changelog here are throwaway.
      - name: Smoke-test release packaging
        run: |
          dotnet publish Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj -c Release -o publish
          TAG=v0.0.0-ci PLUGIN_VER=0.0.0.0 python3 scripts/package_release.py
          python3 -c "
          import json
          m = json.load(open('artifacts/manifest.json'))
          assert m[0]['guid'] == '604f4e22-a0a1-490d-b383-d60336318eaa', 'GUID changed!'
          assert m[0]['versions'], 'manifest has no versions'
          print('manifest ok:', [v['version'] for v in m[0]['versions']])
          "
