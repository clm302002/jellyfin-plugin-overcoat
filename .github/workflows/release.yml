name: Release plugin

# Builds the plugin on a pushed tag, packages a Jellyfin plugin .zip + repository manifest.json
# (via scripts/package_release.py — no jprm), and publishes them on a GitHub Release.
#
# TWO CHANNELS, decided by the tag shape:
#
#   v0.7.0          -> STABLE. A normal release. Because GitHub's "latest" deliberately skips
#                      prereleases, the stable manifest URL can never serve a beta:
#                        https://github.com/<repo>/releases/latest/download/manifest.json
#
#   v0.7.0-beta.1   -> BETA. Published as a prerelease AND its manifest is mirrored onto a fixed,
#                      rolling release tagged `beta`, so the beta channel has a stable URL too:
#                        https://github.com/<repo>/releases/download/beta/manifest.json
#
# Add both URLs in Jellyfin and you can move between channels from the plugin catalogue — no SSH,
# no copying DLLs into the plugins folder by hand.
#
# Each channel keeps its own manifest history (the previous manifest is downloaded and merged), so
# Jellyfin's version dropdown can offer older builds to roll back to.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build a release for, e.g. v0.1.0 or v0.7.0-beta.1'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # For workflow_dispatch the default checkout is the SELECTED BRANCH, not the tag typed in
          # the input — so without the verification step below an operator could publish arbitrary
          # branch content under any tag name. (A-18)
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Verify the checkout is the requested tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then TAG="$INPUT_TAG"; fi

          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::Refusing to release '$TAG' — tags must look like v1.2.3 or v1.2.3-beta.1"; exit 1 ;;
          esac

          git rev-parse -q --verify "refs/tags/$TAG^{commit}" >/dev/null \
            || { echo "::error::Tag $TAG does not exist"; exit 1; }

          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "refs/tags/$TAG^{commit}")" ]; then
            echo "::error::HEAD is not the commit tagged $TAG — refusing to publish."
            exit 1
          fi
          echo "Verified: HEAD == refs/tags/$TAG"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version and channel
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then TAG="${{ github.event.inputs.tag }}"; fi

          # Strip the leading v, then split off any prerelease suffix (-beta.1, -rc.2, ...).
          RAW="${TAG#v}"
          BASE="${RAW%%-*}"
          if [ "$RAW" != "$BASE" ]; then CHANNEL=beta; else CHANNEL=stable; fi

          # Normalise BASE to exactly three parts, then append a fourth.
          case "$BASE" in
            *.*.*.*) BASE="${BASE%.*}" ;;   # 4-part tag: drop the extra
            *.*.*)   ;;                     # already 3-part
            *.*)     BASE="${BASE}.0" ;;
            *)       BASE="${BASE}.0.0" ;;
          esac

          # Jellyfin versions are plain 4-part numbers with no notion of a prerelease, so the
          # channel lives in the FOURTH part:
          #
          #     0.7.0-beta.1  -> 0.7.0.1     beta builds count up from 1
          #     0.7.0-beta.2  -> 0.7.0.2
          #     0.7.0         -> 0.7.0.500   the release sits ABOVE every beta of the same version
          #     0.8.0-beta.1  -> 0.8.0.1     the next line starts over, higher because the minor moved
          #
          # 500 is arbitrary but deliberate: it leaves room for ~499 betas and still sorts under the
          # next version. The obvious choice of .0 for a release is WRONG here — it puts the finished
          # build BELOW every beta of that version, so anyone who tested beta.2 would never be offered
          # the release containing the fixes their testing produced. They'd sit on the older build,
          # which Jellyfin considers newer, until the next version's first beta.
          if [ "$CHANNEL" = "beta" ]; then
            N="$(printf '%s' "${RAW#*-}" | tr -dc '0-9')"
            [ -n "$N" ] || N=1
            [ "$N" -ge 500 ] && { echo "::error::Beta number $N must stay below 500"; exit 1; }
            PLUGIN_VER="${BASE}.${N}"
          else
            PLUGIN_VER="${BASE}.500"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "plugin_ver=$PLUGIN_VER" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG on the $CHANNEL channel (plugin version $PLUGIN_VER)"

      # -p:Version pins the ASSEMBLY version to the same number the manifest will advertise. Without
      # it the DLL keeps whatever is hardcoded in the csproj, and Jellyfin shows the assembly version
      # while logging the meta.json one — the exact mismatch that suppresses the catalogue's update
      # button and breaks the plugin card image. (A-30)
      - name: Publish
        env:
          PLUGIN_VER: ${{ steps.ver.outputs.plugin_ver }}
        run: |
          set -euo pipefail
          dotnet publish Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj -c Release -o publish \
            -p:Version="$PLUGIN_VER" -p:AssemblyVersion="$PLUGIN_VER" -p:FileVersion="$PLUGIN_VER"

      - name: Assert the built DLL carries the release version
        env:
          PLUGIN_VER: ${{ steps.ver.outputs.plugin_ver }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, sys
          want = os.environ["PLUGIN_VER"]
          # Search the raw assembly bytes rather than shelling out to `strings`, so this does not
          # depend on binutils being on the runner. Assembly version metadata is stored as UTF-16
          # in the #Strings/#US heaps, hence checking both encodings.
          data = open("publish/Jellyfin.Plugin.Overcoat.dll", "rb").read()
          if want.encode("utf-8") not in data and want.encode("utf-16-le") not in data:
              sys.exit(f"::error::Built DLL does not carry version {want} — "
                       f"the -p:Version override did not take effect.")
          print(f"OK: DLL carries {want}")
          PY

      - name: Fetch both channels' existing manifests (for version history)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Each channel keeps its own history, so both are merged independently below. Never fail
          # the release over a missing one — package_release.py says loudly if history is lost.
          gh release download --pattern manifest.json --output prev-stable.json 2>/dev/null \
            || echo "No existing stable manifest (first stable release?)"
          gh release download beta --pattern manifest.json --output prev-beta.json 2>/dev/null \
            || echo "No existing beta manifest (first beta release?)"

      - name: Package zip + manifest for this release
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PLUGIN_VER: ${{ steps.ver.outputs.plugin_ver }}
          REPO: ${{ github.repository }}
          # A beta's own release page carries beta history; a stable's carries stable history.
          PREV_MANIFEST: ${{ steps.ver.outputs.channel == 'beta' && 'prev-beta.json' || 'prev-stable.json' }}
          CHANGELOG_FILE: CHANGELOG.md
        run: python3 scripts/package_release.py

      - name: Package the beta-channel manifest
        if: steps.ver.outputs.channel == 'stable'
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PLUGIN_VER: ${{ steps.ver.outputs.plugin_ver }}
          REPO: ${{ github.repository }}
          PREV_MANIFEST: prev-beta.json
          OUTPUT_DIR: artifacts-beta
          CHANGELOG_FILE: CHANGELOG.md
        run: |
          # The beta channel is a SUPERSET, not a parallel track: someone who subscribes only to the
          # beta URL to "always get the newest build" must still receive stable releases, or they
          # silently fall behind the moment a stable ships without a beta before it. So every stable
          # release is merged into the beta manifest too, pointing at the same .zip.
          python3 scripts/package_release.py

      - name: Build the release notes
        id: notes
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
        run: |
          # The notes people actually read are the ones on the release page, so put the real
          # changelog there rather than a pointer to a file they have to go open.
          python3 - <<'PY' > RELEASE_NOTES.md
          import os, sys
          sys.path.insert(0, "scripts")
          from package_release import extract_changelog
          tag = os.environ["TAG"]
          channel = os.environ["CHANNEL"]
          body = extract_changelog("CHANGELOG.md", tag)
          if channel == "beta":
              print("> **Pre-release build.** Add the beta repository in Jellyfin to install it:")
              print("> `https://github.com/%s/releases/download/beta/manifest.json`" % os.environ.get("GITHUB_REPOSITORY", ""))
              print()
          print(body)
          print()
          print("---")
          print()
          print("### Install")
          print()
          print("Jellyfin → Dashboard → Plugins → Repositories → **+**, then add:")
          print()
          print("```")
          print("https://github.com/%s/releases/latest/download/manifest.json" % os.environ.get("GITHUB_REPOSITORY", ""))
          print("```")
          print()
          print("Then Catalog → Overcoat → Install, and restart Jellyfin. Existing installs can update from the same page.")
          PY
          echo "Wrote RELEASE_NOTES.md"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
        run: |
          PRERELEASE=""
          [ "$CHANNEL" = "beta" ] && PRERELEASE="--prerelease"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/overcoat_*.zip artifacts/manifest.json --clobber
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" artifacts/overcoat_*.zip artifacts/manifest.json \
              --title "Overcoat $TAG" --notes-file RELEASE_NOTES.md $PRERELEASE
          fi

      - name: Publish the beta channel manifest
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ steps.ver.outputs.channel }}
        run: |
          # Betas need a URL that doesn't move, and `releases/latest` deliberately excludes
          # prereleases. A fixed `beta` release gives the beta channel its own stable manifest URL.
          # Runs for stable releases too — see the packaging step above for why.
          MANIFEST=artifacts/manifest.json
          [ "$CHANNEL" = "stable" ] && MANIFEST=artifacts-beta/manifest.json

          if ! gh release view beta >/dev/null 2>&1; then
            gh release create beta "$MANIFEST" \
              --title "Overcoat beta channel" --prerelease \
              --notes "Rolling manifest for the beta channel. Add this URL in Jellyfin to receive pre-release builds:
          \`https://github.com/${GITHUB_REPOSITORY}/releases/download/beta/manifest.json\`

          Betas are for testing — expect rough edges, and keep the stable repository added too."
          else
            gh release upload beta "$MANIFEST" --clobber
          fi
