name: Release plugin

# On a pushed tag (v*), builds the plugin, packages a Jellyfin plugin .zip + repository
# manifest.json (via scripts/package_release.py — no jprm), and publishes them as assets on a
# GitHub Release. Users add the manifest URL in Jellyfin:
#   https://github.com/clm302002/jellyfin-plugin-overcoat/releases/latest/download/manifest.json

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build a release for, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then TAG="${{ github.event.inputs.tag }}"; fi
          PLUGIN_VER="${TAG#v}"
          case "$PLUGIN_VER" in
            *.*.*.*) ;;            # already 4-part
            *.*.*)  PLUGIN_VER="${PLUGIN_VER}.0" ;;
            *.*)    PLUGIN_VER="${PLUGIN_VER}.0.0" ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "plugin_ver=$PLUGIN_VER" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (plugin version $PLUGIN_VER)"

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.Overcoat/Jellyfin.Plugin.Overcoat.csproj -c Release -o publish

      - name: Package zip + manifest
        env:
          TAG: ${{ steps.ver.outputs.tag }}
          PLUGIN_VER: ${{ steps.ver.outputs.plugin_ver }}
          REPO: ${{ github.repository }}
          CHANGELOG: "See CHANGELOG.md for ${{ steps.ver.outputs.tag }}."
        run: python3 scripts/package_release.py

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/overcoat_*.zip artifacts/manifest.json --clobber
          else
            gh release create "$TAG" artifacts/overcoat_*.zip artifacts/manifest.json \
              --title "Overcoat $TAG" --notes "Install: add the repository manifest in Jellyfin — see the README. Changes: see CHANGELOG.md."
          fi
