overview: "Status overlays and watch/trending/IMDB Top 250 badges for TV & movie posters."
description: >
  In-process Jellyfin plugin that applies status overlays
  (NEW / AIRING / RETURNING / ENDED / CANCELED) to TV-show posters and watch-history,
  TMDB-trending and IMDB Top 250 badges to TV and movie posters. Successor to the
  external Kometa-Jellyfin (jellymeta) Python script — no callback server, no cron,
  configured from the dashboard and run as a scheduled task.
